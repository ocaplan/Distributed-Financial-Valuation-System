# ============================================================
# Distributed Financial Valuation System - Configuration
# ============================================================
# Launch a 3-node cluster (each in its own JVM/process):
#   java -jar dfvs.jar --server.port=8081 --dfvs.node-id=node-1 \
#       --dfvs.cluster.nodes=node-1=localhost:8081,node-2=localhost:8082,node-3=localhost:8083
#   java -jar dfvs.jar --server.port=8082 --dfvs.node-id=node-2 \
#       --dfvs.cluster.nodes=node-1=localhost:8081,node-2=localhost:8082,node-3=localhost:8083
#   java -jar dfvs.jar --server.port=8083 --dfvs.node-id=node-3 \
#       --dfvs.cluster.nodes=node-1=localhost:8081,node-2=localhost:8082,node-3=localhost:8083
#
# Or use scripts/start-cluster.sh.
# ============================================================

spring.application.name=dfvs

# --- Server ---
server.port=8080

# --- Node Identity & Cluster Topology ---
# Each node's id must end in -N (e.g. node-1). N is its Bully election priority.
# Default is a single-node setup matching server.port=8080. The cluster scripts
# override --dfvs.cluster.nodes on the command line for multi-JVM runs.
dfvs.node-id=node-1
dfvs.cluster.nodes=node-1=localhost:8080

# --- Bully Election ---
# How long to wait for an OK reply from a higher-priority peer.
dfvs.election.ok-timeout-ms=1500
# How long to wait for a COORDINATOR after a higher peer responded OK.
dfvs.election.coordinator-timeout-ms=5000
# How often each follower probes the current leader.
dfvs.election.leader-check-interval-ms=3000
# Consecutive misses before declaring the leader dead and re-electing.
dfvs.election.leader-miss-threshold=2

# --- Worker ---
dfvs.worker.threads=2
dfvs.worker.idle-poll-ms=500
dfvs.worker.simulated-work-min-ms=300
dfvs.worker.simulated-work-max-ms=900

# --- Leader heartbeat monitoring ---
dfvs.heartbeat.interval-ms=3000
dfvs.heartbeat.dead-threshold=2

# --- Task Queue ---
dfvs.task.timeout-ms=30000

# --- Shared H2 (file mode + AUTO_SERVER so multiple JVMs share one task log) ---
# First node to start hosts an in-process TCP server on a random port; the rest
# automatically connect as TCP clients. This is H2's "automatic mixed mode".
spring.datasource.url=jdbc:h2:file:./data/dfvsdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# --- Logging ---
logging.level.com.dfvs=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
